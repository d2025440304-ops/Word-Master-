<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>背单词 - 极简质感版</title>
<style>
/* ========== 核心变量与 Apple 级 Neu-Minimalism 规范 ========== */
:root {
  /* 配色与质感 */
  --bg: #f2f2f7;
  --card-bg: rgba(255, 255, 255, 0.85);
  --primary: #1d1d1f;
  --success: #34c759;
  --success-bg: rgba(52, 199, 89, 0.08);
  --success-text: #248a3d;
  --danger: #ff3b30;
  --danger-bg: rgba(255, 59, 48, 0.06);
  --danger-text: #c62828;
  --warning-bg: rgba(255, 149, 0, 0.08);
  --warning-text: #b26800;
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #aeaeb2;
  
  /* 极其细腻的边框与复合阴影 */
  --border: rgba(0, 0, 0, 0.04);
  --border-strong: rgba(0, 0, 0, 0.08);
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02);
  --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.02), 0 12px 32px rgba(0, 0, 0, 0.04), 0 24px 64px rgba(0, 0, 0, 0.04);
  
  /* 物理回弹动效参数 */
  --radius: 24px;
  --ease: cubic-bezier(0.25, 1, 0.5, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }

/* 状态驱动：统一显隐与淡入动画 */
.hidden { display: none !important; }

/* 定义淡入关键帧 */
@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ========== 桌面双栏布局（增加呼吸感） ========== */
#app { min-height: 100vh; display: flex; flex-direction: column; }

.main-layout {
  flex: 1;
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 320px;
  flex-shrink: 0;
  padding: 64px 40px;
  display: flex;
  flex-direction: column;
  gap: 48px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: rgba(242, 242, 247, 0.6);
}

.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 64px 40px;
  gap: 32px;
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
}

/* ========== 头 ========== */
.header { text-align: left; }
.header h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.4px;
}
.header .subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 4px;
  font-weight: 500;
}

/* ========== 统计（层次重新梳理） ========== */
.stats-area { display: flex; flex-direction: column; gap: 32px; }
.stat-hero-value {
  font-size: 64px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  letter-spacing: -2px;
}
.stat-hero-label {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
  font-weight: 500;
}
.stat-row { display: flex; gap: 36px; }
.stat-item-inline { display: flex; flex-direction: column; gap: 4px; }
.stat-value-sm { font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
.stat-label-sm { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
.stat-row-sm {
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  line-height: 1.6;
}
.stat-row-sm strong { color: var(--text); font-weight: 600; }

/* ========== 进度条 ========== */
.progress-wrap {
  background: var(--border-strong);
  border-radius: 6px;
  height: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 6px;
  transition: width 0.6s var(--ease);
}

/* ========== 工具栏（Nav） ========== */
.toolbar { display: flex; flex-wrap: wrap; gap: 8px; }
.tool-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 14px;
  border: none;
  border-radius: 14px;
  background: transparent;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.2s var(--ease), transform 0.15s var(--ease);
  font-family: inherit;
}
.tool-btn:hover { background: rgba(0,0,0,0.05); }
.tool-btn:active { transform: scale(0.92); }
.tool-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; font-weight: 500; }

/* ========== 模式标签 ========== */
.mode-tabs {
  display: flex;
  background: rgba(0,0,0,0.04);
  border-radius: 12px;
  padding: 4px;
  width: fit-content;
}
.mode-tab {
  padding: 10px 28px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.25s var(--ease);
  font-family: inherit;
  white-space: nowrap;
}
.mode-tab:active { transform: scale(0.96); }
.mode-tab.active {
  background: rgba(255,255,255,0.95);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* ========== 卡片区域与动画 ========== */
.card-wrapper {
  width: 100%;
  max-width: 600px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 16px;
  animation: fadeUp 0.4s var(--ease) forwards;
}

.card-container {
  perspective: 1200px;
  min-height: 420px;
  flex: 1;
  cursor: pointer;
}
.card {
  width: 100%;
  height: 100%;
  min-height: 420px;
  position: relative;
  transition: transform 0.6s var(--ease);
  transform-style: preserve-3d;
}
.card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: var(--radius);
  background: var(--card-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px;
  border: 1px solid rgba(255,255,255,0.4);
}
.card-back { transform: rotateY(180deg); }

.word-en {
  font-size: 60px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.8px;
  text-align: center;
  word-break: break-word;
}
.word-phonetic {
  font-size: 20px;
  color: var(--text-tertiary);
  margin-top: 12px;
  font-family: 'SF Pro Text', sans-serif;
}
.word-hint {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-top: 48px;
  font-weight: 500;
}
.word-cn {
  font-size: 32px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  line-height: 1.5;
  letter-spacing: -0.5px;
}
.word-example {
  font-size: 16px;
  color: var(--text-secondary);
  margin-top: 20px;
  font-style: italic;
  text-align: center;
  line-height: 1.6;
}

.badge {
  position: absolute;
  top: 24px;
  right: 24px;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 20px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.badge-new { background: rgba(0,0,0,0.04); color: var(--text-secondary); }
.badge-review { background: rgba(0,122,255,0.08); color: #007aff; }

/* 推进提示 */
.advance-hint {
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
  user-select: none;
  animation: fadeUp 0.3s var(--ease);
}

/* ========== 按钮（卡片内） ========== */
.card-actions {
  display: flex;
  gap: 12px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
  transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
}
.card-actions.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }

.btn {
  flex: 1;
  padding: 16px 20px;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s var(--ease), opacity 0.15s var(--ease), background 0.2s var(--ease);
  font-family: inherit;
}
.btn:active { transform: scale(0.95); }

/* 克制的色彩情绪引导 */
.btn-know { background: var(--success-bg); color: var(--success-text); }
.btn-know:hover { background: rgba(52, 199, 89, 0.12); }
.btn-unsure { background: var(--warning-bg); color: var(--warning-text); }
.btn-unsure:hover { background: rgba(255, 149, 0, 0.12); }
.btn-dunno { background: var(--danger-bg); color: var(--danger-text); }
.btn-dunno:hover { background: rgba(255, 59, 48, 0.1); }
.btn-primary { background: var(--primary); color: #fff; }

/* ========== 选择题 ========== */
.choice-container {
  background: var(--card-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 48px 32px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.4);
  animation: fadeUp 0.4s var(--ease);
}
.choice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 36px;
}
.choice-btn {
  padding: 18px 16px;
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  background: rgba(255,255,255,0.5);
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  font-family: inherit;
  color: var(--text);
  word-break: break-word;
}
.choice-btn:active { transform: scale(0.96); }
.choice-btn:hover { border-color: rgba(0,0,0,0.15); background: rgba(0,0,0,0.01); }
.choice-btn.correct { border-color: var(--success); background: var(--success-bg); color: var(--success-text); }
.choice-btn.wrong { border-color: var(--danger); background: var(--danger-bg); color: var(--danger-text); }
.choice-btn:disabled { pointer-events: none; }

/* ========== 拼写 ========== */
.spelling-container {
  background: var(--card-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 48px 32px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.4);
  animation: fadeUp 0.4s var(--ease);
}
.spelling-cn { font-size: 28px; font-weight: 600; color: var(--text); margin-bottom: 32px; letter-spacing: -0.5px; }
.spelling-input {
  width: 100%; max-width: 360px;
  padding: 16px 20px;
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  font-size: 24px;
  font-family: 'SF Pro Text', inherit;
  font-weight: 500;
  text-align: center;
  outline: none;
  letter-spacing: 1px;
  background: rgba(255,255,255,0.5);
  transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
.spelling-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
.spelling-input.correct { border-color: var(--success); background: var(--success-bg); color: var(--success-text); }
.spelling-input.wrong { border-color: var(--danger); background: var(--danger-bg); color: var(--danger-text); }
.spelling-result { margin-top: 16px; font-size: 16px; font-weight: 500; min-height: 24px; }

/* ========== 快捷键 ========== */
.kbd-hint { text-align: center; font-size: 13px; color: var(--text-tertiary); font-weight: 500; animation: fadeUp 0.5s var(--ease); }
.kbd {
  display: inline-block;
  background: rgba(0,0,0,0.05);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 12px;
  font-family: inherit;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}

/* ========== 空状态 ========== */
.empty-state { text-align: center; color: var(--text-secondary); padding: 60px 20px; animation: fadeUp 0.4s var(--ease); }
.empty-state .emoji { font-size: 64px; margin-bottom: 20px; }
.empty-state p { font-size: 16px; line-height: 1.6; color: var(--text-secondary); font-weight: 500; }

/* ========== Toast ========== */
.toast {
  position: fixed; top: 32px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: rgba(30, 30, 30, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: #fff; padding: 12px 28px; border-radius: 24px;
  font-size: 15px; font-weight: 500; opacity: 0; transition: all 0.3s var(--ease);
  pointer-events: none; z-index: 100;
  box-shadow: var(--shadow-sm);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ========== 遮罩 + 面板 ========== */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 50; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s var(--ease);
}
.overlay.show { opacity: 1; pointer-events: auto; }
.panel {
  background: #fff; width: 100%; max-width: 520px;
  border-radius: 28px 28px 0 0; padding: 32px 32px 48px;
  max-height: 80vh; overflow-y: auto;
  transform: translateY(100%); transition: transform 0.4s var(--ease);
  box-shadow: 0 -8px 32px rgba(0,0,0,0.1);
}
.overlay.show .panel { transform: translateY(0); }
.panel h3 { font-size: 20px; margin-bottom: 20px; text-align: center; font-weight: 700; letter-spacing: -0.3px; }
.panel textarea {
  width: 100%; height: 220px; border: 1px solid var(--border-strong);
  border-radius: 16px; padding: 16px; font-size: 15px; font-family: inherit;
  resize: vertical; outline: none; transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
  background: rgba(0,0,0,0.02);
}
.panel textarea:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
.panel .hint { font-size: 13px; color: var(--text-secondary); margin: 12px 0 24px; line-height: 1.5; }
.panel .btn-row { display: flex; gap: 12px; }

/* ========== 单词本浮层页面 ========== */
.wordbook-panel { max-width: 680px; padding: 28px 24px 36px; }
.wordbook-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 16px; margin-bottom: 18px;
}
.wordbook-head h3 { text-align: left; margin: 0 0 4px; }
.wordbook-subtitle { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.wordbook-close {
  width: 36px; height: 36px; border: none; border-radius: 50%;
  background: rgba(0,0,0,0.05); color: var(--text-secondary);
  font-size: 22px; line-height: 1; cursor: pointer; flex-shrink: 0;
  transition: background 0.2s var(--ease), transform 0.15s var(--ease);
}
.wordbook-close:active { transform: scale(0.92); }
.wordbook-tabs {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  padding: 4px; background: rgba(0,0,0,0.04); border-radius: 14px; margin-bottom: 14px;
}
.wordbook-tab {
  border: none; border-radius: 11px; background: transparent;
  padding: 10px 8px; font-size: 14px; font-weight: 600;
  color: var(--text-secondary); font-family: inherit; cursor: pointer;
}
.wordbook-tab.active { background: #fff; color: var(--text); box-shadow: var(--shadow-sm); }
.wordbook-summary {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px;
}
.wordbook-metric {
  padding: 12px; border-radius: 14px; background: rgba(0,0,0,0.03);
}
.wordbook-metric strong { display: block; font-size: 22px; color: var(--text); line-height: 1; }
.wordbook-metric span { display: block; margin-top: 6px; font-size: 12px; color: var(--text-secondary); }
.wordbook-list {
  display: flex; flex-direction: column; gap: 6px;
  max-height: min(52vh, 460px); overflow-y: auto; padding-right: 2px;
}
.wordbook-row {
  display: grid; grid-template-columns: minmax(88px, 0.8fr) minmax(0, 1.4fr) auto;
  align-items: center; gap: 10px; padding: 12px 10px;
  border-radius: 14px; background: rgba(0,0,0,0.025);
}
.wordbook-row:hover { background: rgba(0,0,0,0.045); }
.wordbook-word { font-size: 15px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wordbook-meaning { font-size: 14px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wordbook-level {
  min-width: 52px; padding: 5px 8px; border-radius: 999px;
  font-size: 12px; font-weight: 700; text-align: center;
  background: rgba(0,0,0,0.05); color: var(--text-secondary);
}
.wordbook-level.mastered { background: var(--success-bg); color: var(--success-text); }
.wordbook-empty {
  min-height: 180px; display: flex; align-items: center; justify-content: center;
  text-align: center; color: var(--text-secondary); line-height: 1.7;
  background: rgba(0,0,0,0.025); border-radius: 18px; padding: 24px;
}

/* ========== 登录/注册面板 ========== */
.auth-panel { max-width: 400px; }
.auth-field { margin-bottom: 12px; }
.auth-field input {
  width: 100%; padding: 14px 16px;
  border: 1px solid var(--border-strong);
  border-radius: 14px; font-size: 16px; font-family: inherit;
  outline: none; background: rgba(0,0,0,0.02);
  transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
.auth-field input:focus {
  border-color: var(--primary);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
}
.auth-switch {
  text-align: center; margin-top: 20px;
  font-size: 14px; color: var(--text-secondary);
}
.auth-switch a {
  color: var(--primary); text-decoration: none; font-weight: 600;
}
.auth-logout {
  text-align: center; margin-top: 12px; font-size: 14px;
}
.auth-logout a { color: var(--text-tertiary); text-decoration: none; }
.auth-panel .btn-row .btn { flex: 1; }
.auth-guest-btn {
  width: 100%; margin-top: 10px; background: rgba(0,0,0,0.04);
  color: var(--text); font-weight: 600;
}
.auth-guest-note {
  margin-top: 10px; text-align: center; font-size: 12px;
  color: var(--text-tertiary); line-height: 1.5;
}

/* ========== 日历 ========== */
.calendar-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  font-size: 12px; color: var(--text-secondary); text-align: center; margin-bottom: 8px; font-weight: 500;
}
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.calendar-cell {
  aspect-ratio: 1; border-radius: 4px; cursor: pointer;
  transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
}
.calendar-cell:hover { transform: scale(1.3); z-index: 10; box-shadow: var(--shadow-sm); }
.calendar-cell.selected { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 5px; }
.cal-0 { background: rgba(0,0,0,0.04); }
.cal-1 { background: #9be9a8; }
.cal-2 { background: #40c463; }
.cal-3 { background: #30a14e; }
.calendar-legend {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 13px; color: var(--text-secondary); margin: 20px 0 8px; font-weight: 500;
}
.calendar-detail {
  text-align: center; font-size: 15px; color: var(--text);
  min-height: 60px; padding: 12px 16px; background: rgba(0,0,0,0.03);
  border-radius: 12px; line-height: 1.6; font-weight: 500;
}

/* ========== 移动端响应式优雅缩放 ========== */
@media (max-width: 768px) {
  .main-layout { flex-direction: column; }
  .sidebar {
    width: 100%; flex-shrink: 0; padding: 32px 24px 24px;
    gap: 24px; border-right: none;
    border-bottom: 1px solid var(--border); overflow-y: visible;
    background: transparent;
  }
  .main-area { padding: 32px 24px 120px; gap: 20px; justify-content: flex-start; }

  .stat-hero-value { font-size: 48px; }
  .stat-row { gap: 24px; }
  .stat-value-sm { font-size: 20px; }

  .card-container { min-height: 360px; }
  .card { min-height: 360px; }
  .word-en { font-size: 48px; }
  .word-cn { font-size: 26px; }
  .card-face { padding: 32px 24px; }

  .btn { padding: 16px; font-size: 16px; }
  .choice-btn { padding: 14px 10px; font-size: 15px; }
  .spelling-input { font-size: 20px; }

  /* 底部安全区与高斯模糊 Nav */
  .sidebar .toolbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(242, 242, 247, 0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);

// ========== 云端同步（Supabase） ==========
let _syncTimer = null;

// 从云端拉取数据并合并到本地（更新的一方优先）
async function syncFromCloud() {
  if (guestMode) return;
  if (!dbClient) return;
  const { data: { user } } = await dbClient.auth.getUser();
  if (!user) return;

  try {
    // 拉取单词进度，与本地合并：取 last_review 更新的那条
    const { data: cloudWords } = await dbClient.from('word_progress')
      .select('word_key, level, last_review, next_review')
      .eq('user_id', user.id);

    if (cloudWords) {
      for (const cw of cloudWords) {
        const wordKey = normalizeWordKey(cw.word_key);
        const local = appData.words[wordKey];
        const cloudTime = cw.last_review ? new Date(cw.last_review).getTime() : 0;
        const localTime = (local && local.lastReview) ? local.lastReview : 0;
        if (!local || cloudTime > localTime) {
          appData.words[wordKey] = {
            level: cw.level,
            lastReview: cloudTime || null,
            nextReview: cw.next_review ? new Date(cw.next_review).getTime() : null,
            custom: local ? local.custom : false
          };
        }
      }
    }

    // 拉取每日统计，与本地合并：每天各项取最大值
    const { data: cloudStats } = await dbClient.from('daily_stats')
      .select('date, learned, reviewed, correct, duration')
      .eq('user_id', user.id);

    if (cloudStats) {
      for (const cs of cloudStats) {
        const local = appData.dailyStats[cs.date];
        if (!local) {
          appData.dailyStats[cs.date] = { learned: cs.learned, reviewed: cs.reviewed, correct: cs.correct, duration: cs.duration };
        } else {
          local.learned = Math.max(local.learned, cs.learned);
          local.reviewed = Math.max(local.reviewed, cs.reviewed);
          local.correct = Math.max(local.correct, cs.correct);
          local.duration = Math.max(local.duration, cs.duration);
        }
      }
    }

    // 拉取用户设置并合并
    const { data: settings } = await dbClient.from('user_settings')
      .select('streak, last_study_date, bank, custom_words')
      .eq('user_id', user.id)
      .single();

    if (settings) {
      if (settings.streak > (appData.streak || 0)) appData.streak = settings.streak;
      if (settings.last_study_date && (!appData.lastStudyDate || settings.last_study_date > appData.lastStudyDate)) {
        appData.lastStudyDate = settings.last_study_date;
      }
      if (settings.bank && !appData.bank) appData.bank = settings.bank;

      // 合并自定义单词定义（按 w 去重）
      if (settings.custom_words && Array.isArray(settings.custom_words)) {
        const existing = new Set(appData.customWords.map(cw => normalizeWordKey(cw.w)));
        for (const cw of settings.custom_words) {
          const key = normalizeWordKey(cw.w);
          if (key && !existing.has(key)) {
            appData.customWords.push({ ...cw, w: key });
            existing.add(key);
          }
        }
        invalidateWordCaches();
      }
    }

    pruneUntouchedWordStates();
    saveData(); // 合并结果写回 localStorage
  } catch (e) {
    console.warn('云端同步拉取失败', e);
  }
}

// 推送本地数据到云端（防抖 3 秒，避免频繁请求）
async function syncToCloud() {
  if (guestMode) return;
  if (!dbClient) return;
  flushStudyDuration();
  const { data: { user } } = await dbClient.auth.getUser();
  if (!user) return;

  try {
    const now = new Date().toISOString();

    // 同步单词进度（分批 upsert，每批最多 50 条）
    const wordEntries = Object.entries(appData.words).filter(([, state]) =>
      state && ((state.level || 0) > 0 || state.lastReview || state.nextReview)
    );
    for (let i = 0; i < wordEntries.length; i += 50) {
      const batch = wordEntries.slice(i, i + 50).map(([key, state]) => ({
        user_id: user.id,
        word_key: key,
        level: state.level,
        last_review: state.lastReview ? new Date(state.lastReview).toISOString() : null,
        next_review: state.nextReview ? new Date(state.nextReview).toISOString() : null,
        updated_at: now
      }));
      const { error } = await dbClient.from('word_progress').upsert(batch, { onConflict: 'user_id, word_key' });
      if (error) console.warn('同步单词进度失败', error);
    }

    // 同步每日统计
    const statsEntries = Object.entries(appData.dailyStats);
    if (statsEntries.length > 0) {
      const statsBatch = statsEntries.map(([date, s]) => ({
        user_id: user.id, date,
        learned: s.learned, reviewed: s.reviewed, correct: s.correct, duration: s.duration
      }));
      const { error } = await dbClient.from('daily_stats').upsert(statsBatch, { onConflict: 'user_id, date' });
      if (error) console.warn('同步每日统计失败', error);
    }

    // 同步用户设置
    const { error } = await dbClient.from('user_settings').upsert({
      user_id: user.id,
      streak: appData.streak || 0,
      last_study_date: appData.lastStudyDate,
      bank: currentBank,
      custom_words: appData.customWords || []
    }, { onConflict: 'user_id' });
    if (error) console.warn('同步用户设置失败', error);
  } catch (e) {
    console.warn('云端同步推送失败', e);
  }
}

function scheduleCloudSync() {
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => {
    syncToCloud();
    _syncTimer = null;
  }, 3000);
}

// ========== 词库管理 ==========
function getActiveWords() {
  if (activeWordsCache) return activeWordsCache;
  const fileCustom = (typeof CUSTOM_WORDS !== 'undefined') ? CUSTOM_WORDS : [];
  let all = CET4_WORDS;
  if (currentBank === 'cet6') all = CET6_WORDS;
  else if (currentBank === 'custom') all = [...fileCustom, ...(appData.customWords || [])];
  const seen = new Set();
  activeWordsCache = all.filter(w => {
    const key = normalizeWordKey(w.w);
    const ok = key && !seen.has(key);
    if (ok) seen.add(key);
    return ok;
  });
  activeWordMapCache = null;
  return activeWordsCache;
}

function getActiveWordMap() {
  if (activeWordMapCache) return activeWordMapCache;
  activeWordMapCache = new Map();
  getActiveWords().forEach(word => activeWordMapCache.set(normalizeWordKey(word.w), word));
  return activeWordMapCache;
}

function getKnownWordKeySet() {
  const keys = new Set();
  CET4_WORDS.forEach(w => keys.add(normalizeWordKey(w.w)));
  CET6_WORDS.forEach(w => keys.add(normalizeWordKey(w.w)));
  if (typeof CUSTOM_WORDS !== 'undefined') CUSTOM_WORDS.forEach(w => keys.add(normalizeWordKey(w.w)));
  (appData.customWords || []).forEach(w => keys.add(normalizeWordKey(w.w)));
  return keys;
}

function hasCustomWords() {
  const fileCustom = (typeof CUSTOM_WORDS !== 'undefined') ? CUSTOM_WORDS : [];
  return fileCustom.length > 0 || (appData.customWords || []).length > 0;
}

function normalizeWordKey(word) {
  return String(word || '').trim().toLowerCase();
}

function ensureWord(wordKey) {
  const key = normalizeWordKey(wordKey);
  if (!Object.prototype.hasOwnProperty.call(appData.words, key)) {
    appData.words[key] = { level: 0, lastReview: null, nextReview: null, custom: false };
  }
  activeStatsCache = null;
  return appData.words[key];
}

function pruneUntouchedWordStates() {
  let changed = false;
  for (const [key, state] of Object.entries(appData.words || {})) {
    if (!state || ((state.level || 0) === 0 && !state.lastReview && !state.nextReview)) {
      delete appData.words[key];
      changed = true;
    }
  }
  if (changed) invalidateWordCaches();
  return changed;
}

function getActiveStats() {
  const activeWords = getActiveWords();
  const signature = activeWords.length + '|' + Object.keys(appData.words).length + '|' + currentBank + '|' + Math.floor(Date.now() / 60000);
  if (activeStatsCache && activeStatsSignature === signature) return activeStatsCache;

  const now = Date.now();
  let review = 0;
  let brandNew = 0;
  let mastered = 0;
  let learned = 0;

  for (const word of activeWords) {
    const state = appData.words[normalizeWordKey(word.w)];
    if (!state) {
      brandNew++;
      continue;
    }
    if (state.level >= 6) mastered++;
    if (state.level > 0 || state.lastReview) learned++;
    if (state.nextReview && state.nextReview <= now && state.level < 6) review++;
    if ((state.level || 0) === 0 && !state.lastReview && !state.nextReview) brandNew++;
  }

  activeStatsCache = { total: activeWords.length, review, newWords: brandNew, mastered, learned };
  activeStatsSignature = signature;
  return activeStatsCache;
}

// ========== 复习算法（艾宾浩斯曲线） ==========
const REVIEW_INTERVALS = [0, 1440, 2880, 5760, 10080, 21600, 43200]; // 分钟

function getNextReviewTime(level) {
  const minutes = REVIEW_INTERVALS[Math.min(level, REVIEW_INTERVALS.length - 1)];
  return Date.now() + minutes * 60 * 1000;
}

function getLearningQueues(excludeWords = new Set()) {
  const allWords = getActiveWords();
  const now = Date.now();

  const reviewQueue = [];
  const weakQueue = [];
  const newQueue = [];
  const masteredQueue = [];

  for (const word of allWords) {
    if (excludeWords.has(word.w)) continue;
    const state = appData.words[normalizeWordKey(word.w)];
    if (state && state.level === 0 && state.nextReview) {
      if (state.nextReview <= now) {
        reviewQueue.push({ word, type: 'review', due: state.nextReview, level: 0 });
      }
    } else if (state && state.nextReview && state.nextReview <= now && state.level > 0 && state.level < 6) {
      reviewQueue.push({ word, type: 'review', due: state.nextReview || 0, level: state.level });
    } else if (state && state.level > 0 && state.level < 3) {
      weakQueue.push({ word, type: 'review', due: state.nextReview || Number.MAX_SAFE_INTEGER, level: state.level });
    } else if (!state || state.level === 0) {
      newQueue.push({ word, type: 'new', due: Number.MAX_SAFE_INTEGER, level: 0 });
    } else if (state && state.level >= 6) {
      masteredQueue.push({ word, type: 'review', due: state.nextReview || Number.MAX_SAFE_INTEGER, level: state.level });
    }
  }

  reviewQueue.sort((a, b) => (a.due - b.due) || (a.level - b.level));
  weakQueue.sort((a, b) => (a.level - b.level) || (a.due - b.due));
  shuffle(newQueue);
  shuffle(masteredQueue);

  return { reviewQueue, weakQueue, newQueue, masteredQueue };
}

function takeFromQueue(queue, limit, picked) {
  const taken = [];
  while (queue.length && taken.length < limit) {
    const item = queue.shift();
    if (picked.has(item.word.w)) continue;
    picked.add(item.word.w);
    taken.push(item);
  }
  return taken;
}

function pickNextWord() {
  const { reviewQueue, weakQueue, newQueue, masteredQueue } = getLearningQueues();

  if (reviewQueue.length > 0 && newQueue.length > 0 && Math.random() < 0.7) {
    return reviewQueue[0];
  }
  if (reviewQueue.length > 0) return reviewQueue[0];
  if (weakQueue.length > 0) return weakQueue[0];
  if (newQueue.length > 0) return newQueue[0];
  if (masteredQueue.length > 0) return masteredQueue[0];
  return null;
}

function markWord(wordKey, known) {
  const state = ensureWord(wordKey);
  if (known) {
    state.level = Math.min(6, state.level + 1);
  } else {
    state.level = 0;
  }
  state.lastReview = Date.now();
  state.nextReview = getNextReviewTime(state.level);
  activeStatsCache = null;
  return { newLevel: state.level };
}

function markWordUnsure(wordKey) {
  const state = ensureWord(wordKey);
  state.lastReview = Date.now();
  state.nextReview = Date.now() + 10 * 60 * 1000;
  activeStatsCache = null;
  return { newLevel: state.level };
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ========== 学习计时与每日统计 ==========
function startTimer() {
  if (studyTimer) return;
  sessionStartTime = sessionStartTime || Date.now();
  studyTimer = setInterval(() => {
    studySeconds++;
    updateStatsUI();
  }, 1000);
}

function stopTimer() {
  if (studyTimer) {
    clearInterval(studyTimer);
    studyTimer = null;
  }
}

function getDailyStats() {
  const today = getToday();
  if (!Object.prototype.hasOwnProperty.call(appData.dailyStats, today)) {
    appData.dailyStats[today] = { learned: 0, reviewed: 0, correct: 0, duration: 0 };
  }
  return appData.dailyStats[today];
}

function recordStudy(known) {
  const stats = getDailyStats();
  if (currentWord && currentWord.type === 'review') {
    stats.reviewed++;
  } else {
    stats.learned++;
  }
  if (known) stats.correct++;

  const today = getToday();
  const y = new Date();
  y.setDate(y.getDate() - 1);
  const yesterday = fmtLocalDate(y);
  if (appData.lastStudyDate === yesterday) {
    appData.streak++;
  } else if (appData.lastStudyDate !== today) {
    appData.streak = 1;
  }
  appData.lastStudyDate = today;
  saveData();
}

function getTodaySeconds() {
  const saved = appData.dailyStats[getToday()]?.duration || 0;
  return saved + studySeconds;
}

function flushStudyDuration() {
  if (!appData || studySeconds <= 0) return;
  const stats = getDailyStats();
  stats.duration = (stats.duration || 0) + studySeconds;
  studySeconds = 0;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  } catch (e) {
    console.warn("Storage quota exceeded or inaccessible.", e);
  }
}

function getWordBookEntries() {
  const allWords = getActiveWords();
  const wordMap = {};
  allWords.forEach(w => { wordMap[w.w] = w; });

  const entries = [];
  for (const [key, state] of Object.entries(appData.words)) {
    const word = wordMap[key];
    if (word && state && (state.level > 0 || state.lastReview)) {
      entries.push({
        word: key,
        meaning: word.m || '',
        phonetic: word.p || '',
        example: word.e || '',
        level: state.level,
        lastReview: state.lastReview || 0,
        nextReview: state.nextReview || null
      });
    }
  }

  entries.sort((a, b) => {
    if (b.level !== a.level) return b.level - a.level;
    if (b.lastReview !== a.lastReview) return b.lastReview - a.lastReview;
    return a.word.localeCompare(b.word);
  });

  return entries;
}

function getFilteredWordBookEntries(entries) {
  if (wordBookTab === 'mastered') return entries.filter(e => e.level >= 6);
  if (wordBookTab === 'learning') return entries.filter(e => e.level < 6);
  return entries;
}

// ========== 进度控制 ==========
function advanceWord() {
  clearAutoAdvance();
  sessionIndex++;
  if (sessionIndex < sessionWords.length) {
    currentWord = sessionWords[sessionIndex];

  } else {
    flushStudyDuration();

    showToast(`✅ 本轮完成！今日已学 ${stats.learned + stats.reviewed} 词，用时 ${Math.floor(getTodaySeconds() / 60)} 分钟`);

}

function showAdvanceHint() {
  waitingAdvance = true;
  $('advanceHint').classList.remove('hidden');
}

function hideAdvanceHint() {
  waitingAdvance = false;
  $('advanceHint').classList.add('hidden');
}

function clearAutoAdvance() {
  if (autoAdvanceTimer) {
    clearTimeout(autoAdvanceTimer);
    autoAdvanceTimer = null;
  }
}

function scheduleAutoAdvance(delay) {
  clearAutoAdvance();
  const expectedWord = currentWord ? currentWord.word.w : null;
  autoAdvanceTimer = setTimeout(() => {
    autoAdvanceTimer = null;
    if (!currentWord || currentWord.word.w !== expectedWord || waitingAdvance) return;
    advanceWord();
  }, delay);
}

function tryAdvance() {
  if (waitingAdvance) {
    hideAdvanceHint();
    advanceWord();
  }
}

function scheduleImmediateRetry(item) {
  if (!item || !item.word) return;
  const wordKey = item.word.w;
  const count = sessionWordCounts[wordKey] || 1;
  if (count >= 2) return;

  const futureHasSameWord = sessionWords
    .slice(sessionIndex + 1)
    .some(s => s.word.w === wordKey);
  if (futureHasSameWord) return;

  sessionWordCounts[wordKey] = count + 1;
  const retryItem = { word: item.word, type: 'review', retry: true };
  const minGap = 3;
  const maxGap = 6;
  const gap = Math.min(maxGap, Math.max(minGap, sessionWords.length - sessionIndex));
  const insertAt = Math.min(sessionWords.length, sessionIndex + gap);
  sessionWords.splice(insertAt, 0, retryItem);
}

// ========== 模式应答逻辑 ==========
function answerFlashcard(quality) {
  if (!currentWord || !isFlipped || answerLocked) return;
  answerLocked = true;
  const wordKey = currentWord.word.w;
  const isCorrect = quality === 'know';
  
  if (isCorrect) {
    const res = markWord(wordKey, true);
    recordStudy(true);
    if (res.newLevel >= 6) showToast('🎉 ' + wordKey + ' 已掌握！');
  } else if (quality === 'unsure') {
    markWordUnsure(wordKey);
    recordStudy(false);
    scheduleImmediateRetry(currentWord);
  } else {
    markWord(wordKey, false);
    recordStudy(false);
    scheduleImmediateRetry(currentWord);
  }

  const card = $('card');
  card.classList.remove('flipped');
  isFlipped = false;
  $('flashcardActions').classList.remove('visible');

  let handled = false;
  const afterFlip = () => {
    if (handled) return;
    handled = true;
    card.removeEventListener('transitionend', afterFlip);
    isCorrect ? advanceWord() : showAdvanceHint();
  };
  card.addEventListener('transitionend', afterFlip);
  setTimeout(afterFlip, 700);
}

function answerChoice(index, choices) {
  if (!currentWord || answerLocked) return;
  answerLocked = true;
  const wordData = currentWord.word;
  const correctIndex = choices.findIndex(c => c.w === wordData.w);
  const isCorrect = index === correctIndex;

  const btns = $('choiceGrid').querySelectorAll('.choice-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIndex) btn.classList.add('correct');
    else if (i === index) btn.classList.add('wrong');
  });

  markWord(wordData.w, isCorrect);
  recordStudy(isCorrect);
  if (!isCorrect) scheduleImmediateRetry(currentWord);
  
  if (isCorrect && appData.words[normalizeWordKey(wordData.w)].level >= 6) showToast('🎉 ' + wordData.w + ' 已掌握！');
  isCorrect ? scheduleAutoAdvance(1000) : showAdvanceHint();
}

function answerSpelling() {
  if (!currentWord || answerLocked) return;
  const input = $('spellingInput');
  const value = input.value.trim();
  if (!value || input.disabled) return;
  answerLocked = true;

  const wordData = currentWord.word;
  const isCorrect = value.toLowerCase() === wordData.w.toLowerCase();

  if (isCorrect) {
    input.className = 'spelling-input correct';
    $('spellingResult').textContent = `✅ 正确！${wordData.p ? ' ' + wordData.p : ''} ${wordData.m}`;
    $('spellingResult').style.color = 'var(--success-text)';
  } else {
    input.className = 'spelling-input wrong';
    $('spellingResult').textContent = `❌ 正确答案：${wordData.w} ${wordData.p ? ' ' + wordData.p : ''} ${wordData.m}`;
    $('spellingResult').style.color = 'var(--danger-text)';
  }

  markWord(wordData.w, isCorrect);
  recordStudy(isCorrect);
  if (!isCorrect) scheduleImmediateRetry(currentWord);
  
  if (isCorrect && appData.words[normalizeWordKey(wordData.w)].level >= 6) showToast('🎉 ' + wordData.w + ' 已掌握！');
  
  input.disabled = true;
  isCorrect ? scheduleAutoAdvance(1200) : showAdvanceHint();
}

function buildSession() {
  clearAutoAdvance();
  hideAdvanceHint();
  answerLocked = false;
  sessionWords = [];
  sessionWordCounts = {};

  const picked = new Set();
  const { reviewQueue, weakQueue, newQueue, masteredQueue } = getLearningQueues();
  const dueReviews = takeFromQueue(reviewQueue, reviewQueue.length >= 15 ? 15 : 10, picked);
  const weakReviews = takeFromQueue(weakQueue, Math.min(2, 15 - dueReviews.length), picked);
  const newWords = takeFromQueue(newQueue, Math.min(5, 15 - dueReviews.length - weakReviews.length), picked);
  const reviews = [...dueReviews, ...weakReviews];
  const fallback = [
    ...takeFromQueue(reviewQueue, 15 - reviews.length - newWords.length, picked),
    ...takeFromQueue(weakQueue, 15 - reviews.length - newWords.length, picked),
    ...takeFromQueue(newQueue, 15 - reviews.length - newWords.length, picked),
    ...takeFromQueue(masteredQueue, 15 - reviews.length - newWords.length, picked)
  ];

  let reviewIndex = 0;
  let newIndex = 0;
  while (sessionWords.length < 15 && (reviewIndex < reviews.length || newIndex < newWords.length)) {
    for (let i = 0; i < 2 && reviewIndex < reviews.length && sessionWords.length < 15; i++) {
      sessionWords.push(reviews[reviewIndex++]);
    }
    if (newIndex < newWords.length && sessionWords.length < 15) {
      sessionWords.push(newWords[newIndex++]);
    }
  }

  for (const item of fallback) {
    if (sessionWords.length >= 15) break;
    sessionWords.push(item);
  }

  sessionWords.forEach(item => {
    sessionWordCounts[item.word.w] = (sessionWordCounts[item.word.w] || 0) + 1;
  });
  sessionIndex = 0;
  currentWord = sessionWords.length > 0 ? sessionWords[0] : null;
}

    const knownKeys = getKnownWordKeySet();
    
    for (const line of lines) {
      let parts = line.includes(' - ') ? line.split(' - ') : line.includes('\t') ? line.split('\t') : null;
      if (!parts) {
        const idx = line.indexOf(' ');
        if (idx > 0) parts = [line.slice(0, idx), line.slice(idx + 1)];
      }
      if (parts && parts[0].trim()) {
        const rawWord = parts[0].trim();
        const key = normalizeWordKey(rawWord);
        const rest = (parts[1] || '').trim();
        let p = '', m = rest;
        const match = rest.match(/^(\/[^/]+\/)\s*(.*)/);
        if (match) { p = match[1]; m = match[2]; }
        if (key && m && !knownKeys.has(key)) {
          appData.customWords.push({ w: key, p, m, e: '' });
          knownKeys.add(key);
          added++;
        } else {
          skipped++;
        }
      }
    }
    if (added > 0) {
      invalidateWordCaches();
      saveData();
      showToast(`成功导入 ${added} 个自定义单词${skipped ? '，跳过 ' + skipped + ' 条' : ''}`);
      buildSession();
      renderCard();
    } else {
      showToast('未识别到有效词汇格式');
    }
    closePanel();
  };
  $('btnImportCancel').onclick = closePanel;
}

// ========== 交互与事件挂载 ==========
$('modeTabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.mode-tab');
  if (!tab || tab.dataset.mode === currentMode) return;
  if (waitingAdvance) tryAdvance();
  clearAutoAdvance();
  currentMode = tab.dataset.mode;
  $('modeTabs').querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderCard();
});

$('flashcardMode').addEventListener('click', (e) => { if (!e.target.closest('.btn')) flipCard(); });
$('btnKnow').addEventListener('click', () => answerFlashcard('know'));
$('btnUnsure').addEventListener('click', () => answerFlashcard('unsure'));
$('btnDunno').addEventListener('click', () => answerFlashcard('dunno'));

$('spellingInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') answerSpelling(); });
document.querySelector('.card-wrapper').addEventListener('click', () => { if (waitingAdvance) tryAdvance(); });
$('btnContinue').addEventListener('click', () => { buildSession(); renderCard(); });

$('btnCalendar').addEventListener('click', () => showCalendarPanel());
$('btnWordBook').addEventListener('click', () => showWordBookPanel());
$('btnImport').addEventListener('click', () => showImportPanel());
$('btnReset').addEventListener('click', () => {
  if (confirm('是否重置您的所有学习进度？（词库内容将被保留）')) {
    clearAutoAdvance();
    studySeconds = 0;
    appData.words = {}; appData.dailyStats = {}; appData.streak = 0; appData.lastStudyDate = null;
    saveData(); buildSession(); renderCard(); showToast('系统进度已重置');
  }
});
$('btnBank').addEventListener('click', () => {
  clearAutoAdvance();
  flushStudyDuration();
  currentBank = currentBank === 'cet4' ? 'cet6' : (currentBank === 'cet6' && hasCustomWords()) ? 'custom' : 'cet4';
  appData.bank = currentBank;
  invalidateWordCaches();
  saveData(); buildSession(); renderCard();
  showToast(`已无缝切换至 ${$('bankLabel').textContent}`);
});

$('overlay').addEventListener('click', (e) => { if (e.target === $('overlay')) closePanel(); });

// 认证交互
$('btnAuthSubmit').addEventListener('click', handleAuth);
$('btnGuestMode').addEventListener('click', startGuestMode);

$('authToggle').addEventListener('click', (e) => {
  e.preventDefault();
  authViewState = authViewState === 'login' ? 'register' : 'login';
  syncAuthUI();
});

$('authOverlay').addEventListener('keydown', (e) => {
  if (e.target && e.target.id === 'btnGuestMode') return;
  if (e.key === 'Enter') {
    e.preventDefault();
    handleAuth();
  }
});

$('authLogout').addEventListener('click', (e) => {
  e.preventDefault();
  if (dbClient) dbClient.auth.signOut();
  location.reload();
});

// 全局热键
document.addEventListener('keydown', (e) => {
  if ($('overlay').classList.contains('show')) return;
  if ($('authOverlay').classList.contains('show')) return;
  if (e.target && ['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
  if (waitingAdvance) {
    if (e.key === ' ' || e.code === 'Space' || e.key === 'Enter') { e.preventDefault(); tryAdvance(); }
    return;
  }
  if (currentMode === 'flashcard') {
    if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); flipCard(); }
    else if (e.key === 'ArrowRight' && isFlipped) answerFlashcard('know');
    else if (e.key === 'ArrowDown' && isFlipped) answerFlashcard('unsure');
    else if (e.key === 'ArrowLeft' && isFlipped) answerFlashcard('dunno');
  } else if (currentMode === 'choice') {
    const num = parseInt(e.key);
    if (num >= 1 && num <= 4) {
      const btns = $('choiceGrid').querySelectorAll('.choice-btn');
      if (btns[num - 1] && !btns[num - 1].disabled) btns[num - 1].click();
    }
  }
});

// ========== 认证处理 ==========
async function handleAuth() {
  if (!dbClient) {
    showToast('认证服务暂不可用');
    return;
  }
  const btn = $('btnAuthSubmit');
  if (btn.disabled) return;

  const email = $('fieldEmail').value.trim();
  const password = $('fieldPassword').value;
  const nickname = $('fieldNickname').value.trim();

  if (!email || !password) {
    showToast('请填写邮箱和密码');
    return;
  }
  if (authViewState === 'register' && !nickname) {
    showToast('请填写昵称');
    return;
  }

  btn.disabled = true;

  try {
    const isLogin = authViewState === 'login';
    const result = isLogin
      ? await dbClient.auth.signInWithPassword({ email, password })
      : await dbClient.auth.signUp({
          email,
          password,
          options: { data: { display_name: nickname } }
        });

    if (result.error) {
      showToast(result.error.message);
      return;
    }

    if (!isLogin) {
      showToast('注册成功！请查收邮箱验证邮件');
      authViewState = 'login';
      syncAuthUI();
    } else {
      showToast('登录成功');
      hideAuthPanel();
      guestMode = false;
      startWordApp({ syncCloud: true });
    }
  } catch (e) {
    showToast(e.message || '认证请求失败');
  } finally {
    btn.disabled = false;
  }
}

async function startGuestMode() {
  guestMode = true;
  hideAuthPanel();
  showToast('已进入试用模式，进度将保存在本机');
  startWordApp({ syncCloud: false });
}

async function startWordApp(options = {}) {
  const { syncCloud = !guestMode } = options;
  if (appStarted) return;
  appStarted = true;

  if (syncCloud) await syncFromCloud(); // 先从云端拉取进度并合并
  currentBank = appData.bank || currentBank; // 云端可能覆盖了词库选择
  invalidateWordCaches();
  pruneUntouchedWordStates();
  saveData();

  studySeconds = 0;
  buildSession();
  renderCard();
  startTimer();

  if (!beforeUnloadBound) {
    beforeUnloadBound = true;
    window.addEventListener('beforeunload', () => {
      flushStudyDuration();
      saveData();
    });
  }
}

// ========== 初始化与防错迁移 ==========
function migrateData() {
  const alreadyMigrated = appData.version && appData.version >= 1;
  const normalizedWords = {};
  for (const [key, state] of Object.entries(appData.words || {})) {
    const normalizedKey = normalizeWordKey(key);
    if (!normalizedKey || !state) continue;
    const existing = normalizedWords[normalizedKey];
    if (!existing || (state.lastReview || 0) > (existing.lastReview || 0) || (state.level || 0) > (existing.level || 0)) {
      normalizedWords[normalizedKey] = state;
    }
  }
  appData.words = normalizedWords;

  const customMap = new Map();
  for (const word of (appData.customWords || [])) {
    const key = normalizeWordKey(word.w);
    if (key && !customMap.has(key)) customMap.set(key, { ...word, w: key });
  }
  appData.customWords = Array.from(customMap.values());

  if (!alreadyMigrated) {
    for (const [date, old] of Object.entries(appData.dailyStats)) {
      if (old && Object.prototype.hasOwnProperty.call(old, 'studied')) {
        appData.dailyStats[date] = { learned: old.studied || 0, reviewed: 0, correct: old.known || 0, duration: old.seconds || 0 };
      }
    }

    for (const [key, w] of Object.entries(appData.words)) {
      if (!w) continue;
      if (w.level >= 5) { w.level = 6; w.nextReview = getNextReviewTime(6); }
      else if (w.level > 0 && w.lastReview) { w.nextReview = getNextReviewTime(w.level); }
    }
    appData.version = 1;
  }

  pruneUntouchedWordStates();
  invalidateWordCaches();
  saveData();
}

async function init() {
  initSupabase();

  // 先加载基础数据，让侧边栏正确显示词库数量
  appData = loadData();
  migrateData();
  currentBank = appData.bank || 'cet4';
  updateStatsUI();

  const loggedIn = await checkSession();
  if (loggedIn) {
    guestMode = false;
    hideAuthPanel();
    startWordApp({ syncCloud: true });
  } else {
    showAuthPanel();
    syncAuthUI();
  }
}

init();
</script>
